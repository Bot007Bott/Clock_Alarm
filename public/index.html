<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Suite</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1 class="time-display" id="current-time"></h1>
        <nav class="tab-bar" id="tab-bar">
            <button data-tab="alarm" class="tab active">Alarm</button>
            <button data-tab="timer" class="tab">Timer</button>
            <button data-tab="stopwatch" class="tab">Stopwatch</button>
            <button data-tab="settings" class="tab">Settings</button>
        </nav>
    </header>

    <main class="content" id="content">
        <section id="alarm" class="panel" data-panel="alarm"></section>
        <section id="timer" class="panel hidden" data-panel="timer"></section>
        <section id="stopwatch" class="panel hidden" data-panel="stopwatch"></section>
        <section id="settings" class="panel hidden" data-panel="settings"></section>
    </main>

    <script type="module" src="../src/index.js"></script>
</body>
</html>
